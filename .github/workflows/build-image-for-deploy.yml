name: Build and Push Production Image

on:
  release:
    types: [published]

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check semver tag
        id: semver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if tag is not semver
        if: steps.semver.outputs.valid != 'true'
        run: exit 0

      - uses: actions/checkout@v4
        if: steps.semver.outputs.valid == 'true'

      - name: Login to Docker Hub
        if: steps.semver.outputs.valid == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.semver.outputs.valid == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.semver.outputs.valid == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          pull: true
          push: true

          build-args: |
            APP_NAME=Filament CRM
            CI=true

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/saas-crm:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/saas-crm:${{ github.event.release.tag_name }}

          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/saas-crm:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/saas-crm:buildcache,mode=max
